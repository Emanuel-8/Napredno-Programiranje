<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-Queens — Construction Method</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .slide {
    width: 1280px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }

  .header {
    background: #0d1b2a;
    border-bottom: 1px solid #30363d;
    padding: 24px 36px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .dots { display: flex; gap: 7px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red    { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green  { background: #28c840; }
  .header-title { font-size: 20px; font-weight: 700; color: #f0f6fc; letter-spacing: -0.02em; margin-left: 12px; }
  .header-sub   { font-size: 12px; color: #8b949e; font-weight: 300; margin-top: 2px; }
  .badge {
    margin-left: auto;
    background: #58a6ff22;
    border: 1px solid #58a6ff44;
    color: #58a6ff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px;
    letter-spacing: 0.05em; text-transform: uppercase;
  }

  .controls {
    padding: 20px 36px;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 24px;
    background: #0f1319;
  }
  .ctrl-label { font-size: 13px; color: #8b949e; font-weight: 500; white-space: nowrap; }
  .slider-wrap { flex: 1; display: flex; align-items: center; gap: 16px; }
  input[type=range] {
    -webkit-appearance: none;
    flex: 1; height: 6px;
    background: #30363d; border-radius: 3px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px; border-radius: 50%;
    background: #58a6ff; cursor: pointer;
    box-shadow: 0 0 0 3px #58a6ff33;
    transition: box-shadow 0.2s;
  }
  input[type=range]::-webkit-slider-thumb:hover { box-shadow: 0 0 0 6px #58a6ff33; }
  .size-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700;
    color: #58a6ff; min-width: 52px; text-align: center;
  }
  .queens-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: #8b949e;
    background: #0d1117; border: 1px solid #30363d;
    padding: 6px 14px; border-radius: 8px; white-space: nowrap;
  }
  .queens-badge span { color: #ffa657; font-weight: 700; }

  .content {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    min-height: 460px;
  }

  .panel { padding: 24px 26px; overflow: hidden; }
  .panel + .panel { border-left: 1px solid #30363d; }
  .panel-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: #8b949e;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .panel-label::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  }

  /* Chess board */
  #grid-container {
    display: flex; align-items: center; justify-content: center;
    min-height: 300px;
  }
  .chess-grid { display: grid; border: 2px solid #30363d; border-radius: 6px; overflow: hidden; }
  .cell {
    display: flex; align-items: center; justify-content: center;
    transition: background 0.25s;
    cursor: default; position: relative;
  }
  .cell.light { background: #1f2937; }
  .cell.dark  { background: #161b22; }
  .cell.queen-light { background: #1c3a1c; }
  .cell.queen-dark  { background: #162b16; }
  .cell.attacked-light { background: #2a1a1a; }
  .cell.attacked-dark  { background: #1f1010; }
  .queen-icon {
    font-size: inherit;
    line-height: 1;
    filter: drop-shadow(0 0 6px #3fb95088);
    user-select: none;
  }
  .queen-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    color: #3fb950;
    line-height: 1;
  }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px; font-size: 11px; color: #8b949e; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot  { width: 10px; height: 10px; border-radius: 3px; border: 1px solid; flex-shrink: 0; }

  /* Output panel */
  .output-scroll {
    background: #0d1117; border: 1px solid #30363d; border-radius: 10px;
    padding: 14px 16px; max-height: 390px; overflow-y: auto;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.8;
  }
  .out-row { display: flex; gap: 8px; }
  .out-key { color: #8b949e; min-width: 70px; }
  .out-val { color: #3fb950; font-weight: 700; }
  .out-grid-line { color: #79c0ff; letter-spacing: 0.18em; font-size: 13px; }

  /* Code panel */
  .code-scroll {
    background: #0d1117; border: 1px solid #30363d; border-radius: 10px;
    padding: 14px 16px; max-height: 400px; overflow-y: auto; overflow-x: auto;
  }
  pre { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; line-height: 1.75; white-space: pre; }
  .kw { color: #ff7b72; }
  .ty { color: #ffa657; }
  .fn { color: #d2a8ff; }
  .st { color: #a5d6ff; }
  .cm { color: #8b949e; font-style: italic; }
  .nm { color: #79c0ff; }
  .hl { color: #3fb950; font-weight: 700; }

  .footer {
    border-top: 1px solid #30363d;
    padding: 14px 36px;
    display: flex; align-items: center; justify-content: space-between;
    background: #0d1117;
  }
  .footer-note { font-size: 12px; color: #8b949e; }
  .footer-note strong { color: #58a6ff; }
  .formula { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #8b949e; }
  .formula span { color: #ffa657; }
</style>
</head>
<body>
<div class="slide">

  <div class="header">
    <div class="dots">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div style="margin-left:12px">
      <div class="header-title">N-Queens — C++ Solution</div>
      <div class="header-sub">Construction method · no backtracking · O(n) placement</div>
    </div>
    <div class="badge">C++17</div>
  </div>

  <div class="controls">
    <div class="ctrl-label">Board Size</div>
    <div class="slider-wrap">
      <input type="range" id="size-slider" min="4" max="14" step="1" value="8">
      <div class="size-display"><span id="size-label">8</span>×<span id="size-label2">8</span></div>
    </div>
    <div class="queens-badge">Queens placed = <span id="queens-count">8</span></div>
  </div>

  <div class="content">

    <!-- Col 1: Visual Board -->
    <div class="panel">
      <div class="panel-label">Visual Board</div>
      <div id="grid-container">
        <div class="chess-grid" id="chess-grid"></div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1c3a1c;border-color:#3fb950"></div>Queen</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2a1a1a;border-color:#ff7b72"></div>Attacked</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1f2937;border-color:#374151"></div>Free</div>
      </div>
    </div>

    <!-- Col 2: Program Output -->
    <div class="panel">
      <div class="panel-label">Program Output</div>
      <div class="output-scroll" id="output-box"></div>
    </div>

    <!-- Col 3: C++ Code -->
    <div class="panel">
      <div class="panel-label">C++ Source Code</div>
      <div class="code-scroll"><pre id="cpp-code"></pre></div>
    </div>

  </div>

  <div class="footer">
    <div class="footer-note">Exactly <strong>1 queen</strong> per row, column, and diagonal</div>
    <div class="formula">Construction: <span>even/odd n · remainder cases</span></div>
  </div>

</div>

<script>
  /**
   * Construction-based N-Queens solution (no backtracking).
   * Returns an array `queens` where queens[i] = column (0-indexed) of queen in row i.
   *
   * Algorithm (Explicit Construction):
   *   Based on the classical construction published by various authors.
   *   Works for all n >= 1 (no solution for n=2,3).
   *
   *   Case 1: n % 6 != 2 and n % 6 != 3
   *     Place queens at: 2,4,6,...,n (evens), then 1,3,5,...,n-1 (odds)
   *     (1-indexed columns)
   *
   *   Case 2: n % 6 == 2
   *     Evens: 2,4,6,...,n  →  move 2 to end, put 1 after n
   *     Odds:  3,1,7,9,...,n-1,5
   *
   *   Case 3: n % 6 == 3
   *     Evens: 4,6,8,...,n,2
   *     Odds:  5,7,9,...,n-2,1,3  (adjust as needed)
   *
   * We use the well-known explicit permutation construction.
   */
  function solveNQueens(n) {
    // Returns 1-indexed column positions, one per row
    if (n === 1) return [1];
    if (n <= 3) return null; // no solution

    const result = [];
    const r = n % 6;

    // Build even positions list (1-indexed)
    const evens = [];
    for (let i = 2; i <= n; i += 2) evens.push(i);

    // Build odd positions list (1-indexed)
    const odds = [];
    for (let i = 1; i <= n; i += 2) odds.push(i);

    if (r === 2) {
      // Rotate evens: remove 2 from front, push to back; insert 1 after n
      // Permute evens: 2,4,...,n  → 4,6,...,n,2
      // Permute odds:  1,3,...    → 3,1,7,9,...,n-1,5
      const e2 = evens.slice(1); e2.push(evens[0]); // rotate left
      // odds special: 3,1,7,9,...,n-1,5
      const o2 = [];
      o2.push(3); o2.push(1);
      for (let i = 3; i < odds.length; i++) {
        if (odds[i] !== 5) o2.push(odds[i]);
      }
      o2.push(5);
      result.push(...e2, ...o2);
    } else if (r === 3) {
      // evens: 4,6,...,n,2
      const e3 = evens.slice(1); e3.push(evens[0]); // same rotate
      // odds:  5,7,9,...,n-2,1,3
      const o3 = [];
      for (let i = 2; i < odds.length; i++) o3.push(odds[i]);
      o3.push(1); o3.push(3);
      result.push(...e3, ...o3);
    } else {
      // Default: evens then odds
      result.push(...evens, ...odds);
    }

    // result now has n values (1-indexed columns), one per row
    return result.slice(0, n);
  }

  function isAttacked(queens, n) {
    // Returns a 2D boolean array: true = attacked by at least one queen
    const att = Array.from({length: n}, () => Array(n).fill(false));
    queens.forEach((col, row) => {
      const c = col - 1; // 0-indexed
      for (let j = 0; j < n; j++) {
        if (j !== c) att[row][j] = true; // same row
      }
      for (let i = 0; i < n; i++) {
        if (i !== row) att[i][c] = true; // same col
        // diagonals
        const dc = c + (i - row);
        if (dc >= 0 && dc < n && i !== row) att[i][dc] = true;
        const dc2 = c - (i - row);
        if (dc2 >= 0 && dc2 < n && i !== row) att[i][dc2] = true;
      }
    });
    return att;
  }

  function buildCppCode(n, queens) {
    const arr = queens.join(', ');
    return `<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;vector&gt;</span>
<span class="kw">using namespace</span> <span class="ty">std</span>;

<span class="cm">// Construction-based N-Queens (no backtracking)</span>
<span class="cm">// queens[i] = column of queen in row i (1-indexed)</span>
<span class="ty">vector</span>&lt;<span class="ty">int</span>&gt; <span class="fn">solveNQueens</span>(<span class="ty">int</span> n) {
    <span class="ty">vector</span>&lt;<span class="ty">int</span>&gt; evens, odds;
    <span class="kw">for</span> (<span class="ty">int</span> i = <span class="nm">2</span>; i &lt;= n; i += <span class="nm">2</span>) evens.push_back(i);
    <span class="kw">for</span> (<span class="ty">int</span> i = <span class="nm">1</span>; i &lt;= n; i += <span class="nm">2</span>) odds.push_back(i);

    <span class="ty">int</span> r = n % <span class="nm">6</span>;
    <span class="kw">if</span> (r == <span class="nm">2</span>) {
        <span class="cm">// rotate evens, special odds order</span>
        <span class="ty">int</span> tmp = evens.front();
        evens.erase(evens.begin());
        evens.push_back(tmp);
        odds = {<span class="nm">3</span>, <span class="nm">1</span>};
        <span class="kw">for</span> (<span class="ty">int</span> x : <span class="ty">vector</span>&lt;<span class="ty">int</span>&gt;{}) ; <span class="cm">// rebuild</span>
        <span class="ty">vector</span>&lt;<span class="ty">int</span>&gt; o2 = {<span class="nm">3</span>, <span class="nm">1</span>};
        <span class="kw">for</span> (<span class="ty">int</span> v = <span class="nm">7</span>; v &lt;= n; v += <span class="nm">2</span>)
            <span class="kw">if</span> (v != <span class="nm">5</span>) o2.push_back(v);
        o2.push_back(<span class="nm">5</span>);
        odds = o2;
    } <span class="kw">else if</span> (r == <span class="nm">3</span>) {
        <span class="ty">int</span> tmp = evens.front();
        evens.erase(evens.begin());
        evens.push_back(tmp);
        <span class="ty">vector</span>&lt;<span class="ty">int</span>&gt; o3;
        <span class="kw">for</span> (<span class="ty">int</span> v = <span class="nm">5</span>; v &lt;= n; v += <span class="nm">2</span>) o3.push_back(v);
        o3.push_back(<span class="nm">1</span>); o3.push_back(<span class="nm">3</span>);
        odds = o3;
    }

    <span class="ty">vector</span>&lt;<span class="ty">int</span>&gt; result;
    <span class="kw">for</span> (<span class="ty">int</span> v : evens) result.push_back(v);
    <span class="kw">for</span> (<span class="ty">int</span> v : odds)  result.push_back(v);
    result.resize(n);
    <span class="kw">return</span> result;
}

<span class="ty">int</span> <span class="fn">main</span>() {
    <span class="kw">const</span> <span class="ty">int</span> N = <span class="hl">${n}</span>;
    <span class="ty">auto</span> q = <span class="fn">solveNQueens</span>(N);
    <span class="cm">// Precomputed: {${arr}}</span>

    cout &lt;&lt; <span class="st">"N-Queens solution (N="</span>
         &lt;&lt; N &lt;&lt; <span class="st">"):\\n"</span>;
    <span class="kw">for</span> (<span class="ty">int</span> row = <span class="nm">0</span>; row &lt; N; row++) {
        <span class="kw">for</span> (<span class="ty">int</span> col = <span class="nm">1</span>; col &lt;= N; col++)
            cout &lt;&lt; (q[row]==col ? <span class="st">"Q"</span> : <span class="st">"."</span>)
                 &lt;&lt; <span class="st">" "</span>;
        cout &lt;&lt; <span class="st">"\\n"</span>;
    }

    <span class="cm">// Verify</span>
    <span class="ty">bool</span> ok = <span class="kw">true</span>;
    <span class="kw">for</span> (<span class="ty">int</span> i = <span class="nm">0</span>; i &lt; N && ok; i++)
      <span class="kw">for</span> (<span class="ty">int</span> j = i+<span class="nm">1</span>; j &lt; N && ok; j++) {
        <span class="kw">if</span> (q[i]==q[j]) ok=<span class="kw">false</span>;
        <span class="kw">if</span> (abs(q[i]-q[j])==abs(i-j)) ok=<span class="kw">false</span>;
      }
    cout &lt;&lt; <span class="st">"\\nValid: "</span>
         &lt;&lt; (ok ? <span class="st">"YES"</span> : <span class="st">"NO"</span>)
         &lt;&lt; <span class="st">"\\n"</span>;
    <span class="kw">return</span> <span class="nm">0</span>;
}`;
  }

  function render(n) {
    document.getElementById('size-label').textContent = n;
    document.getElementById('size-label2').textContent = n;
    document.getElementById('queens-count').textContent = n;

    const queens = solveNQueens(n); // 1-indexed columns
    if (!queens) {
      document.getElementById('chess-grid').innerHTML = '<div style="color:#ff7b72;padding:20px;font-size:13px">No solution for n=' + n + '</div>';
      return;
    }

    const att = isAttacked(queens, n);

    // Board
    const maxPx = 280;
    const cellSize = Math.max(18, Math.min(50, Math.floor(maxPx / n)));
    const fontSize = Math.max(9, Math.min(22, Math.floor(cellSize * 0.52)));
    const grid = document.getElementById('chess-grid');
    grid.style.gridTemplateColumns = `repeat(${n}, ${cellSize}px)`;
    grid.innerHTML = '';

    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        const isLight = (i + j) % 2 === 0;
        const hasQueen = queens[i] - 1 === j;
        const isAtt = !hasQueen && att[i][j];

        const div = document.createElement('div');
        div.style.cssText = `width:${cellSize}px;height:${cellSize}px;font-size:${fontSize}px`;
        div.className = 'cell';

        if (hasQueen) {
          div.classList.add(isLight ? 'queen-light' : 'queen-dark');
          const span = document.createElement('span');
          span.className = 'queen-num';
          span.style.fontSize = fontSize + 'px';
          span.textContent = '♛';
          span.style.color = '#3fb950';
          div.appendChild(span);
        } else if (isAtt) {
          div.classList.add(isLight ? 'attacked-light' : 'attacked-dark');
        } else {
          div.classList.add(isLight ? 'light' : 'dark');
        }
        grid.appendChild(div);
      }
    }

    // Output
    const out = document.getElementById('output-box');
    let html = `<div style="color:#58a6ff;font-weight:600;margin-bottom:4px">N-Queens Solution (N=${n}):</div>`;
    html += `<div style="color:#30363d;margin-bottom:6px">${'-'.repeat(Math.min(n * 2, 40))}</div>`;
    for (let i = 0; i < n; i++) {
      let line = '';
      for (let j = 1; j <= n; j++) {
        line += queens[i] === j ? 'Q' : '.';
        if (j < n) line += ' ';
      }
      html += `<div class="out-grid-line">${line}</div>`;
    }
    html += `<div style="height:8px"></div><div style="color:#8b949e;margin-bottom:4px">Queen positions (col per row):</div>`;
    for (let i = 0; i < n; i++) {
      html += `<div class="out-row"><span class="out-key">Row ${String(i+1).padStart(2)}:</span><span class="out-val">col ${queens[i]}</span></div>`;
    }

    // Verify
    let ok = true;
    for (let i = 0; i < n && ok; i++)
      for (let j = i + 1; j < n && ok; j++) {
        if (queens[i] === queens[j]) ok = false;
        if (Math.abs(queens[i] - queens[j]) === Math.abs(i - j)) ok = false;
      }
    html += `<div style="height:6px"></div><div class="out-row"><span class="out-key">Valid:</span><span class="out-val" style="color:${ok ? '#3fb950' : '#ff7b72'}">${ok ? 'YES ✓' : 'NO ✗'}</span></div>`;
    out.innerHTML = html;

    // C++ code
    document.getElementById('cpp-code').innerHTML = buildCppCode(n, queens);
  }

  document.getElementById('size-slider').addEventListener('input', e => render(parseInt(e.target.value)));
  render(8);
</script>
</body>
</html>
